name: Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install check tools
        run: |
          npm init -y >/dev/null
          npm install --no-save html-validate stylelint stylelint-config-standard pa11y-ci @lhci/cli http-server

      - name: HTML validation
        run: npx html-validate "**/*.html" || true

      - name: CSS lint
        run: npx stylelint "assets/css/*.css" || true

      - name: Serve site locally
        run: |
          npx http-server . -p 8080 -s &
          sleep 3

      - name: Pa11y accessibility audit
        run: |
          cat > .pa11yci.json <<'JSON'
          {
            "defaults": { "standard": "WCAG2AA", "timeout": 30000 },
            "urls": [
              "http://localhost:8080/",
              "http://localhost:8080/about/",
              "http://localhost:8080/about/why-maryam.html",
              "http://localhost:8080/programs/",
              "http://localhost:8080/programs/prayers.html",
              "http://localhost:8080/interfaith/",
              "http://localhost:8080/interfaith/maryam-in-islam.html",
              "http://localhost:8080/interfaith/visiting.html",
              "http://localhost:8080/knowledge/",
              "http://localhost:8080/news/",
              "http://localhost:8080/get-involved/donate.html",
              "http://localhost:8080/contact.html"
            ]
          }
          JSON
          npx pa11y-ci --config .pa11yci.json || true

      - name: Lighthouse CI
        run: |
          cat > lighthouserc.json <<'JSON'
          {
            "ci": {
              "collect": {
                "url": [
                  "http://localhost:8080/",
                  "http://localhost:8080/interfaith/maryam-in-islam.html",
                  "http://localhost:8080/contact.html"
                ],
                "numberOfRuns": 1
              },
              "assert": {
                "assertions": {
                  "categories:performance": ["warn", {"minScore": 0.9}],
                  "categories:accessibility": ["error", {"minScore": 1.0}],
                  "categories:best-practices": ["warn", {"minScore": 0.95}],
                  "categories:seo": ["error", {"minScore": 1.0}]
                }
              }
            }
          }
          JSON
          npx lhci autorun --config=./lighthouserc.json || true
